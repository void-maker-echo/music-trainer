<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#1a1a2e">
<title>音感训练营登录</title>
<style>
:root{--bg:#1a1a2e;--card:#16213e;--accent:#e94560;--gold:#f0c040;--text:#eee;--sub:#aab;--green:#4ecca3}
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f3460,#1a1a2e 55%,#16213e);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;padding:20px}.panel{width:100%;max-width:380px;background:rgba(22,33,62,.96);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:24px;box-shadow:0 18px 60px rgba(0,0,0,.35);text-align:center}.logo{font-size:2.8rem}h1{font-size:1.18rem;color:var(--gold);margin:8px 0}p{font-size:.84rem;color:var(--sub);line-height:1.7;margin:0 0 14px}.input{width:100%;height:44px;border:1px solid rgba(255,255,255,.16);border-radius:12px;background:rgba(255,255,255,.08);color:var(--text);padding:0 14px;font-size:1rem;text-align:center;letter-spacing:1px;text-transform:uppercase;outline:none}.input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(233,69,96,.18)}.btn{width:100%;height:46px;border:0;border-radius:23px;background:var(--accent);color:#fff;font-size:.95rem;font-weight:700;margin-top:12px;cursor:pointer;box-shadow:0 4px 15px rgba(233,69,96,.35)}.btn:disabled{opacity:.7;cursor:wait}.feedback{min-height:24px;font-size:.78rem;color:var(--sub);margin:10px 0}.feedback.error{color:var(--accent)}.feedback.ok{color:var(--green)}.admin-link{display:inline-block;margin-top:12px;color:var(--sub);font-size:.76rem;text-decoration:none}
</style>
</head>
<body>
<div class="panel">
<div class="logo">🎵</div>
<h1>音感训练营登录</h1>
<p>请输入所有者发放的邀请码。邀请码通过服务器验证，验证成功后才能进入训练页面。</p>
<input class="input" id="invite-input" maxlength="64" autocomplete="one-time-code" placeholder="邀请码" autofocus>
<div class="feedback" id="feedback">向所有者获取一次性邀请码。</div>
<button class="btn" id="login-btn">进入训练</button>
<a class="admin-link" href="/admin">所有者管理入口</a>
</div>
<script>
function normalizeInvite(code){return (code||'').trim().replace(/\s+/g,'').toUpperCase()}
const input=document.getElementById('invite-input');
const btn=document.getElementById('login-btn');
const feedback=document.getElementById('feedback');
function setFeedback(text,cls){feedback.textContent=text;feedback.className='feedback'+(cls?' '+cls:'')}
async function login(){
  const code=normalizeInvite(input.value);
  if(!code){setFeedback('请输入邀请码。','error');input.focus();return}
  btn.disabled=true;setFeedback('正在验证...');
  try{
    const res=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code})});
    const data=await res.json().catch(()=>({}));
    if(!res.ok||!data.ok){throw new Error(data.error||'邀请码不正确')}
    setFeedback('验证通过，正在进入训练。','ok');
    location.href='/';
  }catch(error){
    setFeedback(error.message||'登录失败，请稍后再试。','error');
    input.select();
  }finally{
    btn.disabled=false;
  }
}
btn.addEventListener('click',login);
input.addEventListener('keydown',event=>{if(event.key==='Enter')login()});
</script>
</body>
</html>
